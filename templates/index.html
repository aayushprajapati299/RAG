<!-- Frontend for Vectorless RAG with chat history. Served by Flask from app.py -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Q&A</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 0.75rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        button {
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            background: #333;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        button.secondary {
            background: transparent;
            color: #666;
            border: 1px solid #ddd;
            font-size: 13px;
            padding: 6px 14px;
        }

        button.secondary:hover {
            background: #f5f5f5;
            color: #333;
        }

        .status {
            font-size: 13px;
            margin-top: 0.5rem;
        }

        .status.success {
            color: #2e7d32;
        }

        .status.error {
            color: #c62828;
        }

        /* Chat area */
        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .chat-box:empty::before {
            content: "Your conversation will appear here after you ask a question.";
            color: #aaa;
            font-size: 14px;
        }

        .bubble {
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-width: 92%;
        }

        .bubble.user {
            background: #1a1a1a;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .bubble.assistant {
            background: #f0f0f0;
            color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
            border-left: 4px solid #1a1a1a;
        }

        .bubble.thinking {
            background: #f7f7f7;
            color: #999;
            align-self: flex-start;
            font-style: italic;
        }

        .sources {
            font-size: 12px;
            color: #888;
            margin-top: 0.35rem;
            align-self: flex-start;
            padding-left: 4px;
        }

        .ask-row {
            display: flex;
            gap: 8px;
            margin-top: 0.75rem;
        }

        .ask-row input {
            margin-bottom: 0;
            flex: 1;
        }

        .ask-row button {
            flex-shrink: 0;
        }

        .chat-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .thinking {
            animation: pulse 1.2s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Document Q&amp;A</h1>
        <p class="subtitle">Upload a document, then ask it anything</p>

        <!-- Upload card -->
        <div class="card">
            <div class="card-title">Document Upload</div>
            <input type="file" id="file-input" accept=".pdf,.txt">
            <button id="upload-btn" onclick="uploadFile()">Upload Document</button>
            <div id="upload-status" class="status"></div>
        </div>

        <!-- Chat card -->
        <div class="card">
            <div class="card-title">Conversation</div>
            <div class="chat-controls">
                <button class="secondary" onclick="clearChat()">Clear chat</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="ask-row">
                <input type="text" id="question-input" placeholder="Ask a question about your document..."
                    onkeydown="if(event.key==='Enter') askQuestion()">
                <button id="ask-btn" onclick="askQuestion()">Ask</button>
            </div>
        </div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');

            if (!fileInput.files[0]) {
                status.textContent = 'Please select a file first.';
                status.className = 'status error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Uploading...';
            status.textContent = '';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    status.textContent = `Document ready — ${data.pages} pages indexed`;
                    status.className = 'status success';
                    clearChat(true);
                } else {
                    status.textContent = data.error || 'Upload failed.';
                    status.className = 'status error';
                }
            } catch (e) {
                status.textContent = 'Upload failed. Is the server running?';
                status.className = 'status error';
            }

            btn.disabled = false;
            btn.textContent = 'Upload Document';
        }

        async function askQuestion() {
            const input = document.getElementById('question-input');
            const btn = document.getElementById('ask-btn');
            const chatBox = document.getElementById('chat-box');
            const question = input.value.trim();

            if (!question) return;

            // Add user bubble
            const userBubble = document.createElement('div');
            userBubble.className = 'bubble user';
            userBubble.textContent = question;
            chatBox.appendChild(userBubble);

            // Add thinking bubble
            const thinkingBubble = document.createElement('div');
            thinkingBubble.className = 'bubble thinking';
            thinkingBubble.textContent = 'Thinking...';
            chatBox.appendChild(thinkingBubble);

            input.value = '';
            btn.disabled = true;
            btn.textContent = 'Thinking...';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();

                // Replace thinking with real answer
                thinkingBubble.className = 'bubble assistant';
                thinkingBubble.textContent = data.answer || data.error || 'No answer returned.';

                // Add sources line
                if (data.sources && data.sources.length > 0) {
                    const srcLine = document.createElement('div');
                    srcLine.className = 'sources';
                    srcLine.textContent = `Sources: Page ${data.sources.join(', Page ')}`;
                    chatBox.appendChild(srcLine);
                }

            } catch (e) {
                thinkingBubble.className = 'bubble assistant';
                thinkingBubble.textContent = 'Could not get an answer. Is the server running?';
            }

            btn.disabled = false;
            btn.textContent = 'Ask';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function clearChat(silent = false) {
            document.getElementById('chat-box').innerHTML = '';
            if (!silent) {
                try {
                    await fetch('/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: '', reset: true })
                    });
                } catch (e) { }
            }
        }
    </script>
</body>

</html>
